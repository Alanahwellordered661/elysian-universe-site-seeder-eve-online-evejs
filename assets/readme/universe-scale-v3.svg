    <text x="1108" y="329" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">verify pass</text>
    <text x="1108" y="362" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">forced full reconcile</text>
  </g>

