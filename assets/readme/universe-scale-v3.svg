    <path d="M-40 348C246 302 492 320 746 218C1012 108 1210 114 1664 54" stroke="#ffd27a" stroke-width="2"/>
  </g>

  <rect x="70" y="64" width="1460" height="772" rx="28" fill="#0c1320" fill-opacity="0.94" stroke="#2c4669" stroke-width="2"/>
  <text x="120" y="128" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="900">ABSURD Full-Universe Site Rebuild</text>
  <text x="120" y="170" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">single node, empty runtime, current EVE JS universe state</text>

  <g>
    <rect x="120" y="214" width="408" height="178" rx="18" fill="#0b2935" stroke="#2af6ff" stroke-width="2"/>
