    <text x="470" y="540" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">broad definitions</text>
    <text x="470" y="568" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">anomalies + signatures</text>
  </g>
  <g>
    <rect x="756" y="438" width="284" height="150" rx="18" fill="#101d2e" stroke="#355b84" stroke-width="2"/>
    <text x="786" y="498" fill="#ff7aad" font-family="JetBrains Mono, Consolas, monospace" font-size="42" font-weight="900">1,656</text>
