    <text x="1104" y="498" fill="#51ffd0" font-family="JetBrains Mono, Consolas, monospace" font-size="42" font-weight="900">68.96x</text>
    <text x="1106" y="540" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">faster cold rebuild</text>
    <text x="1106" y="568" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">vs public EVE JS</text>
