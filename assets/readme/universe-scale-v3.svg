    <text x="156" y="329" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">cold full rebuild</text>
    <text x="156" y="362" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">from cleared runtime state</text>
  </g>
  <g>
    <rect x="596" y="214" width="408" height="178" rx="18" fill="#302414" stroke="#ffd27a" stroke-width="2"/>
    <text x="630" y="287" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="58" font-weight="900">39,570</text>
    <text x="632" y="329" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">instances created</text>
    <text x="632" y="362" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">full persistent site state</text>
