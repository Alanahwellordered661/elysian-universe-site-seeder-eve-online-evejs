  <path d="M120 742H1408" stroke="#2c4669" stroke-width="2"/>
  <text x="120" y="772" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">MEASURED MAY 7, 2026 - PUBLIC ENTRYPOINT - CURRENT EVE JS UNIVERSE DATA</text>
  <text x="120" y="802" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800">
    <tspan fill="#7ce7ff">0.875s</tspan><tspan fill="#c5d1df"> cold CLI wall</tspan>
    <tspan fill="#355b84"> / </tspan>
    <tspan fill="#ffd27a">2.091s</tspan><tspan fill="#c5d1df"> current CLI wall</tspan>
    <tspan fill="#355b84"> / </tspan>
    <tspan fill="#ff7aad">41.57x</tspan><tspan fill="#c5d1df"> current verify vs public EVE JS</tspan>
