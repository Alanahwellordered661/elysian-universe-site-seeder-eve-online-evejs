<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Universe-scale site seeding benchmark</title>
  <desc id="desc">Large benchmark card showing a 0.258 second cold full public EVE JS universe site rebuild and 0.428 second current-state verify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="44%" stop-color="#0d1725"/>
      <stop offset="100%" stop-color="#170817"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2af6ff"/>
      <stop offset="100%" stop-color="#51ffd0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#f9a84f"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7aad"/>
      <stop offset="100%" stop-color="#ff4f96"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="30" fill="url(#bg)"/>
  <g opacity="0.42" filter="url(#glow)">
