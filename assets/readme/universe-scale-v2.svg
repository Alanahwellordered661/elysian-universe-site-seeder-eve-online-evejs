    <text x="420" y="648" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="900">6,057</text>
    <text x="420" y="674" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">site templates</text>
  </g>
  <g>
    <rect x="672" y="616" width="246" height="76" rx="14" fill="#261122" stroke="#ff7aad" stroke-width="1.5"/>
    <text x="696" y="648" fill="#ff7aad" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="900">5,417</text>
    <text x="696" y="674" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">client dungeons</text>
  </g>
  <g>
    <rect x="948" y="616" width="246" height="76" rx="14" fill="#0c1c2e" stroke="#7ce7ff" stroke-width="1.5"/>
    <text x="972" y="648" fill="#7ce7ff" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="900">121,242</text>
    <text x="972" y="674" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">celestials loaded</text>
  </g>
  <g>
    <rect x="1224" y="616" width="184" height="76" rx="14" fill="#102437" stroke="#51ffd0" stroke-width="1.5"/>
    <text x="1248" y="648" fill="#51ffd0" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="900">23</text>
    <text x="1248" y="674" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">families</text>
