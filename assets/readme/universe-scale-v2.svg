<svg width="1600" height="840" viewBox="0 0 1600 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Universe-scale site seeding benchmark</title>
  <desc id="desc">Large benchmark card showing an 8.287 second full EVE JS universe site seeder reconcile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="44%" stop-color="#0d1725"/>
      <stop offset="100%" stop-color="#170817"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2af6ff"/>
      <stop offset="100%" stop-color="#51ffd0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#f9a84f"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7aad"/>
      <stop offset="100%" stop-color="#ff4f96"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

  <rect width="1600" height="840" rx="30" fill="url(#bg)"/>
  <g opacity="0.42" filter="url(#glow)">
    <path d="M-80 486C226 354 412 430 690 286C986 132 1162 188 1680 82" stroke="#2af6ff" stroke-width="3"/>
    <path d="M-72 636C218 548 448 592 736 404C1018 220 1202 306 1690 182" stroke="#ff7aad" stroke-width="3"/>
    <path d="M-40 338C246 292 492 310 746 210C1012 106 1210 114 1664 54" stroke="#ffd27a" stroke-width="2"/>
  </g>

  <rect x="70" y="64" width="1460" height="712" rx="28" fill="#0c1320" fill-opacity="0.94" stroke="#2c4669" stroke-width="2"/>
  <text x="120" y="128" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="900">ABSURD Full-Universe Benchmark</text>
  <text x="120" y="168" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">single node, one click, full current EVE JS universe site state</text>

  <g>
    <rect x="120" y="214" width="408" height="168" rx="18" fill="#0b2935" stroke="#2af6ff" stroke-width="2"/>
    <text x="154" y="286" fill="#2af6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="58" font-weight="900">8.287s</text>
    <text x="156" y="328" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">full seeder reconcile</text>
    <text x="156" y="360" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">39,570 retained, zero churn</text>
  </g>
  <g>
    <rect x="596" y="214" width="408" height="168" rx="18" fill="#302414" stroke="#ffd27a" stroke-width="2"/>
    <text x="630" y="286" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="58" font-weight="900">14.846s</text>
    <text x="632" y="328" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">full CLI wall time</text>
    <text x="632" y="360" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">includes Node load + inspect</text>
  </g>
