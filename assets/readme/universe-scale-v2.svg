    <text x="1108" y="328" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">faster receipt</text>
    <text x="1108" y="360" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">36.887s old mark</text>
  </g>

