    <text x="468" y="490" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="42" font-weight="900">39,432</text>
    <text x="470" y="532" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">broad definitions</text>
    <text x="470" y="560" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">anomalies + signatures</text>
  </g>
  <g>
    <rect x="756" y="430" width="284" height="150" rx="18" fill="#101d2e" stroke="#355b84" stroke-width="2"/>
    <text x="786" y="490" fill="#ff7aad" font-family="JetBrains Mono, Consolas, monospace" font-size="42" font-weight="900">138</text>
    <text x="788" y="532" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">mining definitions</text>
    <text x="788" y="560" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">generated resource sites</text>
  </g>
  <g>
    <rect x="1074" y="430" width="334" height="150" rx="18" fill="#101d2e" stroke="#355b84" stroke-width="2"/>
    <text x="1104" y="490" fill="#51ffd0" font-family="JetBrains Mono, Consolas, monospace" font-size="42" font-weight="900">0 / 0 / 0</text>
    <text x="1106" y="532" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">created / replaced / removed</text>
    <text x="1106" y="560" fill="#c5d1df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">current-state full pass</text>
  </g>

  <g>
