  <path d="M120 724H1408" stroke="#2c4669" stroke-width="2"/>
  <text x="120" y="752" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">MEASURED MAY 7, 2026 - CURRENT EVE JS UNIVERSE DATA</text>
  <text x="120" y="780" font-family="JetBrains Mono, Consolas, monospace" font-size="19" font-weight="800">
    <tspan fill="#7ce7ff">347.56MB</tspan><tspan fill="#c5d1df"> runtime state</tspan>
    <tspan fill="#355b84">  /  </tspan>
    <tspan fill="#ffd27a">64.26MB</tspan><tspan fill="#c5d1df"> authority graph</tspan>
    <tspan fill="#355b84">  /  </tspan>
    <tspan fill="#ff7aad">97.02MB</tspan><tspan fill="#c5d1df"> sharded mining state</tspan>
    <tspan fill="#355b84">  /  </tspan>
    <tspan fill="#51ffd0">39,570</tspan><tspan fill="#c5d1df"> retained seeded instances</tspan>
