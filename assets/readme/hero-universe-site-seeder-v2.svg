<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" style="background:#050914">
  <title id="title">Elysian Universe Site Seeder hero</title>
  <desc id="desc">Cinematic EVE Online universe site seeder banner showing full universe benchmark speed for EVE JS.</desc>
  <defs>
    <radialGradient id="core" cx="54%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#173f58"/>
      <stop offset="48%" stop-color="#0d1725"/>
      <stop offset="100%" stop-color="#050914"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1524" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#111624" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2af6ff"/>
      <stop offset="100%" stop-color="#51ffd0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#f9a84f"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7aad"/>
      <stop offset="100%" stop-color="#ff4f96"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

  <rect width="1600" height="700" rx="30" fill="url(#core)"/>
  <g opacity="0.5" filter="url(#glow)">
    <path d="M-72 426C198 306 386 368 642 246C934 106 1122 140 1690 90" stroke="#2af6ff" stroke-width="3"/>
    <path d="M-68 516C216 412 420 484 696 332C982 174 1194 248 1686 168" stroke="#ff7aad" stroke-width="3"/>
    <path d="M-44 312C246 264 432 298 686 204C948 106 1164 92 1664 42" stroke="#ffd27a" stroke-width="2"/>
  </g>
  <g opacity="0.14">
    <circle cx="1182" cy="104" r="240" fill="#2af6ff"/>
    <circle cx="1278" cy="118" r="180" fill="#ff7aad"/>
    <circle cx="1228" cy="160" r="340" fill="#ffffff"/>
  </g>

  <rect x="70" y="64" width="1460" height="572" rx="28" fill="url(#panel)" stroke="#2c4669" stroke-width="2"/>
  <text x="118" y="124" fill="#2af6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">JOHN ELYSIAN PRESENTS</text>
  <text x="116" y="204" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="900">Elysian Universe Site Seeder</text>
  <text x="120" y="256" fill="#b8c6d8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">
    <tspan x="120" y="256">Full EVE JS universe site state in one absurdly fast native tool.</tspan>
    <tspan x="120" y="292">Anomalies, exploration, generated mining, drifter sites, and persistent dungeon state.</tspan>
  </text>

  <g>
    <rect x="118" y="340" width="315" height="134" rx="18" fill="#0b2935" stroke="#2af6ff" stroke-width="2"/>
    <text x="144" y="400" fill="#2af6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="46" font-weight="900">39,570</text>
    <text x="146" y="438" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">desired sites</text>
  </g>
  <g>
    <rect x="462" y="340" width="315" height="134" rx="18" fill="#302414" stroke="#ffd27a" stroke-width="2"/>
    <text x="488" y="400" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="46" font-weight="900">8.287s</text>
    <text x="490" y="438" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">full reconcile</text>
  </g>
  <g>
    <rect x="806" y="340" width="315" height="134" rx="18" fill="#331426" stroke="#ff7aad" stroke-width="2"/>
    <text x="832" y="400" fill="#ff7aad" font-family="JetBrains Mono, Consolas, monospace" font-size="46" font-weight="900">14.846s</text>
    <text x="834" y="438" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">full CLI wall</text>
  </g>
  <g>
    <rect x="1150" y="340" width="314" height="134" rx="18" fill="#102437" stroke="#7ce7ff" stroke-width="2"/>
    <text x="1176" y="400" fill="#7ce7ff" font-family="JetBrains Mono, Consolas, monospace" font-size="46" font-weight="900">0 churn</text>
    <text x="1178" y="438" fill="#eef7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="900">create / replace / remove</text>
  </g>

  <g>
    <rect x="118" y="518" width="315" height="76" rx="16" fill="#071827" stroke="#2af6ff" stroke-width="1.5" opacity="0.96"/>
    <text x="142" y="550" fill="#2af6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="25" font-weight="900">8,490</text>
    <text x="142" y="576" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">systems loaded</text>
  </g>
  <g>
    <rect x="462" y="518" width="315" height="76" rx="16" fill="#241b10" stroke="#ffd27a" stroke-width="1.5" opacity="0.96"/>
    <text x="486" y="550" fill="#ffd27a" font-family="JetBrains Mono, Consolas, monospace" font-size="25" font-weight="900">6,057</text>
    <text x="486" y="576" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">site templates</text>
  </g>
  <g>
    <rect x="806" y="518" width="315" height="76" rx="16" fill="#261122" stroke="#ff7aad" stroke-width="1.5" opacity="0.96"/>
    <text x="830" y="550" fill="#ff7aad" font-family="JetBrains Mono, Consolas, monospace" font-size="25" font-weight="900">23</text>
    <text x="830" y="576" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">spawn families</text>
  </g>
  <g>
    <rect x="1150" y="518" width="314" height="76" rx="16" fill="#0c1c2e" stroke="#7ce7ff" stroke-width="1.5" opacity="0.96"/>
    <text x="1174" y="550" fill="#7ce7ff" font-family="JetBrains Mono, Consolas, monospace" font-size="25" font-weight="900">4.45x</text>
    <text x="1174" y="576" fill="#d8e8f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">faster than old receipt</text>
  </g>
