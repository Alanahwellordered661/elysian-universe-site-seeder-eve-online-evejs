    <ellipse cx="1210" cy="188" rx="448" ry="112" stroke="#ff7aad" stroke-width="2" opacity="0.34" transform="rotate(-12 1210 188)"/>
    <ellipse cx="1210" cy="188" rx="560" ry="142" stroke="#ffd27a" stroke-width="2" opacity="0.28" transform="rotate(-12 1210 188)"/>
